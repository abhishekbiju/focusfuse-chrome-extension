<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
    <defs>
        <!-- Gradients -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e293b"/>
            <stop offset="100%" stop-color="#020617"/>
        </linearGradient>

        <linearGradient id="fuse-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>

        <radialGradient id="spark-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
        </radialGradient>

        <!-- Drop Shadow -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
        </filter>
        
        <filter id="spark-filter" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background App Icon Shape (Squircle approximation) -->
    <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg-grad)" filter="url(#shadow)"/>
    
    <!-- Outer Focus Ring -->
    <circle cx="64" cy="64" r="38" fill="none" stroke="rgba(59, 130, 246, 0.2)" stroke-width="4" stroke-dasharray="8 6"/>

    <!-- Inner Timer Progress (solid arc) -->
    <path d="M 64 26 A 38 38 0 0 1 102 64 A 38 38 0 0 1 84 96" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>

    <!-- The Fuse -->
    <path d="M 64 88 C 64 64, 44 64, 54 44" fill="none" stroke="url(#fuse-grad)" stroke-width="8" stroke-linecap="round"/>

    <!-- Spark Glow Background -->
    <circle cx="56" cy="40" r="24" fill="url(#spark-glow)"/>

    <!-- The Spark (Center) -->
    <path d="M 56 32 L 60 38 L 66 38 L 62 42 L 64 48 L 56 44 L 48 48 L 50 42 L 46 38 L 52 38 Z" fill="#fbbf24" filter="url(#spark-filter)"/>
    
    <!-- Inner bright dot -->
    <circle cx="56" cy="41" r="2" fill="#fff"/>
</svg>
